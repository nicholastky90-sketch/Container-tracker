<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Container Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh}
.wrap{max-width:440px;margin:0 auto;padding:18px 14px 90px}
.hdr{display:flex;align-items:center;gap:10px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:20px}
.logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#0ea5e9,#0369a1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.title{font-family:monospace;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.sub{font-size:11px;color:#475569;margin-top:2px}
.badge{margin-left:auto;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);border-radius:10px;padding:6px 13px;text-align:center;flex-shrink:0}
.badge-n{font-family:monospace;font-size:24px;font-weight:700;color:#0ea5e9;line-height:1}
.badge-l{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1px}
.zone{border:2px dashed rgba(255,255,255,.1);border-radius:14px;padding:30px 14px;text-align:center;background:rgba(255,255,255,.02)}
.zone-icon{font-size:52px;margin-bottom:12px;display:block}
.zone-h{font-family:monospace;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.zone-p{font-size:13px;color:#475569;margin-bottom:22px;line-height:1.6}
.btn-upload{display:block;width:100%;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;font-weight:700;font-size:18px;font-family:monospace;text-transform:uppercase;border:none;border-radius:12px;padding:18px;cursor:pointer;letter-spacing:2px;margin-bottom:12px}
.btn-upload-gal{display:block;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;font-weight:700;font-size:18px;font-family:monospace;text-transform:uppercase;border-radius:12px;padding:18px;cursor:pointer;letter-spacing:2px}

/* ZOOM EDITOR */
.zoom-box{display:none;border:2px solid rgba(14,165,233,.4);border-radius:14px;overflow:hidden;background:#000;margin-bottom:12px;position:relative}
.zoom-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:5px 12px;border-radius:20px;white-space:nowrap;pointer-events:none;z-index:10;font-family:monospace}
.zoom-canvas{display:block;width:100%;touch-action:none;cursor:grab}
.zoom-canvas:active{cursor:grabbing}
.zoom-controls{display:flex;gap:8px;padding:10px;background:rgba(0,0,0,.4)}
.btn-zoom-in{flex:1;background:rgba(14,165,233,.15);border:1px solid rgba(14,165,233,.3);color:#0ea5e9;font-size:20px;font-weight:700;border-radius:8px;padding:10px;cursor:pointer}
.btn-zoom-out{flex:1;background:rgba(14,165,233,.15);border:1px solid rgba(14,165,233,.3);color:#0ea5e9;font-size:20px;font-weight:700;border-radius:8px;padding:10px;cursor:pointer}
.btn-zoom-reset{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:12px;font-weight:700;border-radius:8px;padding:10px;cursor:pointer;font-family:monospace;text-transform:uppercase}
.btn-scan-now{display:block;width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-weight:700;font-size:17px;font-family:monospace;text-transform:uppercase;border:none;border-radius:12px;padding:16px;cursor:pointer;letter-spacing:2px;margin-top:10px}
.btn-zoom-cancel{display:block;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#475569;font-family:monospace;font-size:13px;font-weight:700;text-transform:uppercase;border-radius:10px;padding:13px;cursor:pointer;margin-top:8px}

.loading{display:none;border:2px dashed rgba(14,165,233,.3);border-radius:14px;padding:24px 14px;text-align:center;background:rgba(14,165,233,.04)}
.loading img{width:100%;max-height:190px;object-fit:cover;border-radius:10px;margin-bottom:18px}
.spin-row{display:inline-flex;align-items:center;gap:10px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.3);border-radius:30px;padding:12px 22px;color:#0ea5e9;font-size:14px;font-weight:600}
.spinner{width:16px;height:16px;border:2.5px solid rgba(14,165,233,.3);border-top-color:#0ea5e9;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.progress{width:100%;background:rgba(255,255,255,.08);border-radius:99px;height:6px;margin-top:14px;overflow:hidden}
.progress-bar{height:6px;background:linear-gradient(90deg,#0ea5e9,#38bdf8);border-radius:99px;transition:width .4s ease;width:0%}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none}
.prev-img{width:100%;max-height:210px;object-fit:cover;display:block;border-radius:12px 12px 0 0}
.prev-bar{display:flex;justify-content:flex-end;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 12px 12px;margin-bottom:12px}
.btn-clr{background:none;border:1px solid rgba(255,255,255,.1);color:#475569;border-radius:6px;padding:4px 14px;font-size:12px;cursor:pointer}
.banner{padding:12px 14px;border-radius:10px;font-size:14px;margin-bottom:12px;font-weight:600;line-height:1.6}
.banner.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.banner.warn{background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.3);color:#facc15}
.banner.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#f87171;font-weight:400;font-size:13px}
.num-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:12px}
.num-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:8px}
#numInput{font-family:monospace;font-size:28px;font-weight:700;letter-spacing:4px;color:#facc15;background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.3);border-radius:8px;padding:11px 14px;width:100%;text-transform:uppercase}
#numInput:focus{outline:none;border-color:#facc15}
.act-row{display:flex;gap:10px}
.btn-retake{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#475569;font-family:monospace;font-size:13px;font-weight:700;text-transform:uppercase;border-radius:10px;padding:13px;cursor:pointer}
.btn-log{flex:2;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-family:monospace;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:10px;padding:13px;cursor:pointer}
.rec-sec{margin-top:28px}
.rec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rec-title{font-family:monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#475569}
.btn-exp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;font-family:monospace;font-size:11px;font-weight:700;text-transform:uppercase;border-radius:8px;padding:7px 13px;cursor:pointer}
.date-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#334155;padding:6px 4px;display:flex;justify-content:space-between}
.rec-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rec-idx{font-size:11px;color:#334155;min-width:22px;font-family:monospace}
.rec-num{font-family:monospace;font-size:17px;color:#facc15;flex:1;letter-spacing:3px;font-weight:700}
.rec-meta{font-size:10px;color:#475569;text-align:right;line-height:1.6}
.btn-del{background:none;border:none;color:#334155;font-size:15px;cursor:pointer;padding:2px 5px;line-height:1}
.empty{text-align:center;padding:28px 14px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.07);border-radius:12px;color:#334155;font-size:13px;line-height:1.8}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<input id="f1" type="file" accept="image/*" capture="environment" style="position:absolute;left:-9999px;top:-9999px" onchange="handleFile(this)">
<input id="f2" type="file" accept="image/*" style="position:absolute;left:-9999px;top:-9999px" onchange="handleFile(this)">

<div class="wrap">
  <div class="hdr">
    <div class="logo">&#128674;</div>
    <div>
      <div class="title">Container Tracker</div>
      <div class="sub">Zoom &rarr; Crop &rarr; AI Scan &rarr; Log</div>
    </div>
    <div class="badge">
      <div class="badge-n" id="totalCount">0</div>
      <div class="badge-l">Logged</div>
    </div>
  </div>

  <!-- Upload Zone -->
  <div class="zone" id="uploadZone">
    <span class="zone-icon">&#128230;</span>
    <div class="zone-h">Scan Container</div>
    <p class="zone-p">Take or upload a photo, zoom into the number, then scan.</p>
    <button class="btn-upload" onclick="openCam()">&#128247;&nbsp; OPEN CAMERA</button>
    <button class="btn-upload-gal" onclick="openGal()">&#128444;&nbsp; CHOOSE FROM GALLERY</button>
  </div>

  <!-- Zoom Editor -->
  <div id="zoomSection" style="display:none">
    <div class="zoom-box" id="zoomBox">
      <div class="zoom-hint" id="zoomHint">&#128269; Pinch or use buttons to zoom &bull; Drag to pan</div>
      <canvas id="zoomCanvas" class="zoom-canvas" height="300"></canvas>
      <div class="zoom-controls">
        <button class="btn-zoom-in" onclick="zoomIn()">+</button>
        <button class="btn-zoom-out" onclick="zoomOut()">&#8722;</button>
        <button class="btn-zoom-reset" onclick="zoomReset()">Reset</button>
      </div>
    </div>
    <button class="btn-scan-now" onclick="scanCropped()">&#128269; SCAN THIS AREA</button>
    <button class="btn-zoom-cancel" onclick="resetAll()">&#8617; Cancel</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingBox">
    <img id="loadingImg" src="" alt="">
    <div class="spin-row"><div class="spinner"></div><span id="scanMsg">Preparing...</span></div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <!-- Result -->
  <div class="result" id="resultBox">
    <img class="prev-img" id="prevImg" src="" alt="">
    <div class="prev-bar"><button class="btn-clr" onclick="resetAll()">&#10005; Clear</button></div>
    <div class="banner" id="banner"></div>
    <div class="num-box">
      <div class="num-lbl">Container Number &mdash; edit if needed</div>
      <input type="text" id="numInput" placeholder="TIIU6093197" maxlength="11"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    </div>
    <div class="act-row">
      <button class="btn-retake" onclick="resetAll()">&#8617; Retake</button>
      <button class="btn-log" onclick="logRecord()">&#9989; Log Record</button>
    </div>
  </div>

  <div class="rec-sec">
    <div class="rec-hdr">
      <div class="rec-title">&#128203; Records</div>
      <button class="btn-exp" onclick="exportCSV()">&#8681; Export CSV</button>
    </div>
    <div id="recList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var WORKER='https://noisy-union-8a2e.nicholastky90.workers.dev/';
var STORE='ct_pro';
var records=[];
try{records=JSON.parse(localStorage.getItem(STORE)||'[]');}catch(e){}
function saveRecords(){localStorage.setItem(STORE,JSON.stringify(records));}
window.onload=function(){renderRecords();};

function openCam(){var f=document.getElementById('f1');f.value='';f.click();}
function openGal(){var f=document.getElementById('f2');f.value='';f.click();}

// ---- ZOOM STATE ----
var zoomImg=null, zoomScale=1, zoomMinScale=1, zoomMaxScale=8;
var zoomOffX=0, zoomOffY=0;
var isDragging=false, lastX=0, lastY=0;
var pinchStartDist=0, pinchStartScale=1;

function handleFile(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      zoomImg=img;
      document.getElementById('uploadZone').style.display='none';
      document.getElementById('zoomSection').style.display='block';
      document.getElementById('zoomBox').style.display='block';
      initZoomCanvas();
      setTimeout(function(){document.getElementById('zoomHint').style.opacity='0';},3000);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function initZoomCanvas(){
  var canvas=document.getElementById('zoomCanvas');
  var wrap=canvas.parentElement;
  canvas.width=wrap.clientWidth||360;
  canvas.height=300;
  zoomScale=1; zoomOffX=0; zoomOffY=0;
  // Fit image to canvas
  var scaleX=canvas.width/zoomImg.width;
  var scaleY=canvas.height/zoomImg.height;
  zoomMinScale=Math.min(scaleX,scaleY);
  zoomScale=zoomMinScale;
  zoomOffX=(canvas.width-zoomImg.width*zoomScale)/2;
  zoomOffY=(canvas.height-zoomImg.height*zoomScale)/2;
  drawZoom();
  bindZoomEvents();
}

function drawZoom(){
  var canvas=document.getElementById('zoomCanvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(zoomImg, zoomOffX, zoomOffY, zoomImg.width*zoomScale, zoomImg.height*zoomScale);
  // Draw crosshair guide
  ctx.strokeStyle='rgba(14,165,233,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(canvas.width*0.1, canvas.height*0.1, canvas.width*0.8, canvas.height*0.8);
  ctx.setLineDash([]);
}

function clampOffset(){
  var canvas=document.getElementById('zoomCanvas');
  var imgW=zoomImg.width*zoomScale, imgH=zoomImg.height*zoomScale;
  var maxX=canvas.width*0.9, minX=canvas.width*0.1-imgW;
  var maxY=canvas.height*0.9, minY=canvas.height*0.1-imgH;
  zoomOffX=Math.max(minX,Math.min(maxX,zoomOffX));
  zoomOffY=Math.max(minY,Math.min(maxY,zoomOffY));
}

function zoomIn(){
  var canvas=document.getElementById('zoomCanvas');
  var cx=canvas.width/2, cy=canvas.height/2;
  var prevScale=zoomScale;
  zoomScale=Math.min(zoomMaxScale, zoomScale*1.4);
  zoomOffX=cx-(cx-zoomOffX)*(zoomScale/prevScale);
  zoomOffY=cy-(cy-zoomOffY)*(zoomScale/prevScale);
  clampOffset(); drawZoom();
}

function zoomOut(){
  var canvas=document.getElementById('zoomCanvas');
  var cx=canvas.width/2, cy=canvas.height/2;
  var prevScale=zoomScale;
  zoomScale=Math.max(zoomMinScale, zoomScale/1.4);
  zoomOffX=cx-(cx-zoomOffX)*(zoomScale/prevScale);
  zoomOffY=cy-(cy-zoomOffY)*(zoomScale/prevScale);
  clampOffset(); drawZoom();
}

function zoomReset(){
  var canvas=document.getElementById('zoomCanvas');
  zoomScale=zoomMinScale;
  zoomOffX=(canvas.width-zoomImg.width*zoomScale)/2;
  zoomOffY=(canvas.height-zoomImg.height*zoomScale)/2;
  drawZoom();
}

function bindZoomEvents(){
  var canvas=document.getElementById('zoomCanvas');

  // Mouse events
  canvas.onmousedown=function(e){isDragging=true;lastX=e.clientX;lastY=e.clientY;};
  canvas.onmousemove=function(e){
    if(!isDragging)return;
    zoomOffX+=e.clientX-lastX; zoomOffY+=e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY;
    clampOffset(); drawZoom();
  };
  canvas.onmouseup=canvas.onmouseleave=function(){isDragging=false;};

  // Touch events
  canvas.ontouchstart=function(e){
    e.preventDefault();
    if(e.touches.length===1){
      isDragging=true;
      lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    } else if(e.touches.length===2){
      isDragging=false;
      pinchStartDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      pinchStartScale=zoomScale;
    }
  };
  canvas.ontouchmove=function(e){
    e.preventDefault();
    if(e.touches.length===1&&isDragging){
      zoomOffX+=e.touches[0].clientX-lastX;
      zoomOffY+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
      clampOffset(); drawZoom();
    } else if(e.touches.length===2){
      var dist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      var newScale=Math.max(zoomMinScale, Math.min(zoomMaxScale, pinchStartScale*(dist/pinchStartDist)));
      var canvas2=document.getElementById('zoomCanvas');
      var cx=(e.touches[0].clientX+e.touches[1].clientX)/2-canvas2.getBoundingClientRect().left;
      var cy=(e.touches[0].clientY+e.touches[1].clientY)/2-canvas2.getBoundingClientRect().top;
      zoomOffX=cx-(cx-zoomOffX)*(newScale/zoomScale);
      zoomOffY=cy-(cy-zoomOffY)*(newScale/zoomScale);
      zoomScale=newScale;
      clampOffset(); drawZoom();
    }
  };
  canvas.ontouchend=function(){isDragging=false;};
}

function scanCropped(){
  // Crop exactly what's visible on canvas and send to AI
  var canvas=document.getElementById('zoomCanvas');
  var out=document.createElement('canvas');
  out.width=canvas.width; out.height=canvas.height;
  out.getContext('2d').drawImage(canvas,0,0);
  var croppedUrl=out.toDataURL('image/jpeg',0.95);
  var b64=croppedUrl.split(',')[1];

  document.getElementById('zoomSection').style.display='none';
  document.getElementById('loadingBox').style.display='block';
  document.getElementById('loadingImg').src=croppedUrl;
  document.getElementById('progressBar').style.width='0%';

  prepareAndScan(b64, croppedUrl);
}

function prepareAndScan(b64orig, previewUrl){
  // Build enhanced + inverted versions
  var img=new Image();
  img.onload=function(){
    var w=img.width, h=img.height;

    // Enhanced contrast
    var c2=document.createElement('canvas'); c2.width=w; c2.height=h;
    var ctx2=c2.getContext('2d'); ctx2.drawImage(img,0,0,w,h);
    var id2=ctx2.getImageData(0,0,w,h); var d2=id2.data;
    for(var i=0;i<d2.length;i+=4){
      var g=0.299*d2[i]+0.587*d2[i+1]+0.114*d2[i+2];
      g=((g-128)*1.8)+128; g=Math.max(0,Math.min(255,g));
      d2[i]=d2[i+1]=d2[i+2]=g;
    }
    ctx2.putImageData(id2,0,0);
    var b64enh=c2.toDataURL('image/jpeg',0.95).split(',')[1];

    // Inverted
    var c3=document.createElement('canvas'); c3.width=w; c3.height=h;
    var ctx3=c3.getContext('2d'); ctx3.drawImage(img,0,0,w,h);
    var id3=ctx3.getImageData(0,0,w,h); var d3=id3.data;
    for(var j=0;j<d3.length;j+=4){d3[j]=255-d3[j];d3[j+1]=255-d3[j+1];d3[j+2]=255-d3[j+2];}
    ctx3.putImageData(id3,0,0);
    var b64inv=c3.toDataURL('image/jpeg',0.95).split(',')[1];

    callAPI(b64orig, b64enh, b64inv, previewUrl);
  };
  img.src='data:image/jpeg;base64,'+b64orig;
}

var PROMPTS=[
  'You are an expert OCR system for ISO shipping containers. Carefully examine this image for a container number. It is EXACTLY 11 characters: 4 uppercase letters followed by 7 digits. Example: TIIU6093197. The number may appear horizontal, vertical, or at any angle. Be extremely careful distinguishing: I vs 1, O vs 0, G vs 6, B vs 8, S vs 5, Z vs 2, Q vs 0. Reply with ONLY the 11 characters. No spaces, no explanation. If not found: NOTFOUND',
  'Shipping container OCR task. Format: [3 letters][U][6 digit serial][1 check digit] = 11 chars total. Common owner codes: TCNU CSNU TIIU MSCU HLXU TGHU GESU TRHU CAIU FSCU CMAU OOLU. Examine EVERY part of the image. Read left to right or top to bottom if vertical. Reply ONLY the 11 chars.',
  'Look at this container photo. Find the ISO 6346 registration number: exactly 4 capital letters then exactly 7 digits. The 4th letter is almost always U. Scan the entire image. Once found, verify each character one more time. Reply ONLY the raw 11-character code.',
  'Perform careful character-by-character reading. Structure: Letter Letter Letter Letter Digit Digit Digit Digit Digit Digit Digit. After reading, double-check: 0 vs O? 1 vs I? 6 vs G? 8 vs B? Correct errors then reply ONLY the final 11-character answer.',
  'Find the container identification code in this image. Rules: exactly 11 chars, first 4 are letters A-Z, last 7 are digits 0-9, 4th letter is usually U. Look at ALL text including sideways or vertical. Reply ONLY the 11-character code.'
];

function scanOnce(b64, prompt, n){
  document.getElementById('scanMsg').textContent='Scanning '+n+' of 5...';
  document.getElementById('progressBar').style.width=((n-1)*14)+'%';
  return fetch(WORKER,{
    method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-opus-4-6',max_tokens:20,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:prompt}
      ]}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.error)throw new Error(j.error.message);
    return ((j.content&&j.content[0]&&j.content[0].text)||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  });
}

function isValidFormat(r){return r&&r!=='NOTFOUND'&&r.length===11&&/^[A-Z]{4}[0-9]{7}$/.test(r);}

function callAPI(b64orig, b64enh, b64inv, imgUrl){
  var results=[];
  var plan=[
    {b64:b64orig,p:PROMPTS[0]},{b64:b64enh,p:PROMPTS[1]},
    {b64:b64orig,p:PROMPTS[2]},{b64:b64enh,p:PROMPTS[3]},
    {b64:b64inv,p:PROMPTS[4]}
  ];
  function run(i){
    if(i>=5){finalize(imgUrl,results,b64enh);return;}
    scanOnce(plan[i].b64,plan[i].p,i+1)
    .then(function(r){results.push(r);run(i+1);})
    .catch(function(){results.push('ERR');run(i+1);});
  }
  run(0);
}

function finalize(imgUrl,results,b64enh){
  document.getElementById('scanMsg').textContent='Double-checking...';
  document.getElementById('progressBar').style.width='80%';
  var valid=results.filter(isValidFormat);
  if(!valid.length){showResult(imgUrl,'','Could not detect. Please type manually.',0,false,false);return;}
  var counts={};
  valid.forEach(function(r){counts[r]=(counts[r]||0)+1;});
  var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
  var winner=sorted[0], votes=counts[winner];
  if(sorted.length>1&&counts[sorted[0]]===counts[sorted[1]]){
    if(validateContainer(sorted[1])&&!validateContainer(sorted[0])){winner=sorted[1];votes=counts[sorted[1]];}
  }

  // Final double-check
  var vp='I detected container number: '+winner+'. Verify by checking each character one by one in this image: '
    +winner.split('').join(' ')+'. If correct reply: CONFIRMED '+winner+'. If wrong reply the correct 11-char code only. If unsure: UNCERTAIN';
  fetch(WORKER,{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-opus-4-6',max_tokens:30,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64enh}},
        {type:'text',text:vp}
      ]}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(j){
    var reply=((j.content&&j.content[0]&&j.content[0].text)||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    var confirmed=false, final=winner;
    if(reply.indexOf('CONFIRMED')===0){confirmed=true;}
    else if(isValidFormat(reply)){
      if(reply===winner){confirmed=true;}
      else if(validateContainer(reply)&&!validateContainer(winner)){final=reply;}
    }
    document.getElementById('progressBar').style.width='100%';
    showResult(imgUrl,final,'',votes,validateContainer(final),confirmed);
  })
  .catch(function(){
    document.getElementById('progressBar').style.width='100%';
    showResult(imgUrl,winner,'',votes,validateContainer(winner),false);
  });
}

function validateContainer(num){
  if(!num||num.length!==11)return false;
  var map={},v=10;
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(function(l){if(v%11===10)v++;map[l]=v++;});
  var sum=0;
  for(var i=0;i<10;i++){var c=num[i],val=isNaN(c)?map[c]:parseInt(c);if(val===undefined)return false;sum+=val*Math.pow(2,i);}
  var chk=sum%11;if(chk===10)chk=0;
  return chk===parseInt(num[10]);
}

function showResult(imgUrl,detected,err,votes,checkOk,confirmed){
  document.getElementById('loadingBox').style.display='none';
  document.getElementById('resultBox').style.display='block';
  document.getElementById('prevImg').src=imgUrl;
  document.getElementById('numInput').value=detected;
  var b=document.getElementById('banner');
  if(detected){
    var perfect=(confirmed&&votes>=3&&checkOk);
    var good=(votes>=4&&checkOk)||(confirmed&&checkOk);
    b.className=(perfect||good)?'banner ok':'banner warn';
    var stars=perfect?'&#9989;&#9989;&#9989;':good?'&#9989;&#9989;':votes>=3?'&#9989;':'&#9888;&#65039;';
    var label=perfect?'100% Confirmed':good?'High Confidence':votes>=3?'Likely Correct':'Please Verify';
    var detail=(confirmed?'Double-check confirmed + ':votes+'/5 scans + ')+(checkOk?'check digit valid':'verify manually');
    b.innerHTML=stars+' '+label+': <span style="font-family:monospace;letter-spacing:3px;font-size:16px">'+detected+'</span>'
      +'<br><small style="font-weight:400;font-size:12px">'+detail+'</small>';
  }else{b.className='banner err';b.textContent=err;}
}

function resetAll(){
  document.getElementById('uploadZone').style.display='block';
  document.getElementById('zoomSection').style.display='none';
  document.getElementById('loadingBox').style.display='none';
  document.getElementById('resultBox').style.display='none';
  document.getElementById('numInput').value='';
  zoomImg=null;
}

function logRecord(){
  var n=document.getElementById('numInput').value.trim().toUpperCase();
  if(!n){showToast('Enter a container number');return;}
  var now=new Date();
  records.unshift({id:Date.now(),containerNumber:n,date:now.toLocaleDateString('en-GB'),time:now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
  saveRecords();showToast(n+' logged!');resetAll();renderRecords();
}

function delRecord(id){records=records.filter(function(r){return r.id!==id;});saveRecords();renderRecords();showToast('Deleted');}

function renderRecords(){
  document.getElementById('totalCount').textContent=records.length;
  var el=document.getElementById('recList');
  if(!records.length){el.innerHTML='<div class="empty">No records yet.<br>Take a photo to get started.</div>';return;}
  var grouped={};
  records.forEach(function(r){if(!grouped[r.date])grouped[r.date]=[];grouped[r.date].push(r);});
  var html='';
  Object.keys(grouped).forEach(function(date){
    var recs=grouped[date];
    html+='<div class="date-lbl"><span>'+date+'</span><span>'+recs.length+' record'+(recs.length>1?'s':'')+'</span></div>';
    recs.forEach(function(r,i){
      html+='<div class="rec-row"><div class="rec-idx">#'+(i+1)+'</div><div class="rec-num">'+r.containerNumber+'</div><div class="rec-meta">'+r.date+'<br>'+r.time+'</div><button class="btn-del" onclick="delRecord('+r.id+')">&#10005;</button></div>';
    });
  });
  el.innerHTML=html;
}

function exportCSV(){
  if(!records.length){showToast('No records yet');return;}
  var rows=[['No.','Container Number','Date','Time']];
  records.forEach(function(r,i){rows.push([i+1,r.containerNumber,r.date,r.time]);});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.map(function(r){return r.join(',');}).join('\n')],{type:'text/csv'}));
  a.download='containers-'+new Date().toLocaleDateString('en-GB').replace(/\//g,'-')+'.csv';
  a.click();showToast('CSV downloaded!');
}

var tt;
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
